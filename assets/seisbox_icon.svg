    C267,268 270,304 273,282
    C276,260 279,222 282,244
    C285,266 288,278 291,264
    C294,250 297,248 300,256
    C303,264 306,240 310,248
    C314,256 318,268 322,258
    C326,248 330,250 334,254
    C338,258 340,258 343,256
    L360,256
    C368,256 372,247 376,252
    C380,257 383,262 387,258
    C391,254 394,252 397,254
    C400,256 402,258 405,256
    C408,254 411,252 414,254
    C417,256 419,257 422,256
    L435,256 L468,256
  "
  fill="none" stroke="#00ccff" stroke-width="20"
  stroke-linecap="round" stroke-linejoin="round"
  opacity="0.08" filter="url(#glowWide)"/>

  <!-- ── Glow tight layer ── -->
  <path d="
