<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111e33"/>
      <stop offset="100%" stop-color="#080f1c"/>
    </linearGradient>

    <filter id="glowWide" x="-30%" y="-300%" width="160%" height="700%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowTight" x="-10%" y="-150%" width="120%" height="400%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- Subtle center ambient glow on BG -->
  <ellipse cx="256" cy="256" rx="200" ry="50" fill="#0a1f3a" opacity="0.6"/>

  <!--
    SEISMIC WAVEFORM — realistic seismogram trace
    Y=256 is baseline. 512px wide, usable x: 44 to 468.

    Sections:
    44  → 130  : flat noise baseline
    130 → 180  : P-wave  (small amp ~±18px, 3 half-cycles)
    180 → 215  : inter-phase quiet
    215 → 350  : S-wave  (large amp, peak ~±140px, decaying ~±60px, ~±30px)
    350 → 435  : coda    (decaying ~±15px → ±6px)
    435 → 468  : flat return

    All transitions are smooth C (cubic bezier).
    One continuous path.
  -->

  <!-- ── Glow wide layer ── -->
  <path d="
    M44,256 L128,256
    C130,256 131,244 133,238 C135,232 137,274 139,268
    C141,262 143,248 145,244 C147,240 149,264 151,260
    C153,256 155,252 157,252 C159,252 161,256 163,256
    L178,256
    C192,256 203,256 215,256
    C217,256 219,218 222,172
